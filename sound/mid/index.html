<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
body { margin:0px auto;font-family:sans-serif;font-size:16px;color:#000;background-color:#777; }

<title>Midi files</title>
<script src="/conet.js"></script>
</head>

<body>
        
<script>
(function() {
  //...
  let dir='/sound/mid';//url=Conet.parseUrl();
  
  let ps={
  cont:document.body
  ,formatStart:function(el) {
    //---
    let s=el.style;
    s.fontSize='2em';
    s.gridColumn='1 / -1';
    s.paddingLeft='6px';
    el.innerHTML='Midi files';
    //...
  }
  ,formatCell:function(el) {
    //---
    let s=el.style;
    s.backgroundColor='#ddd';
    s.paddingLeft='6px';
    let fn=el.innerHTML;
    el.innerHTML='<a href="/sound/mid/TestMidi.htm?fn='+dir+'/'+fn+'">'+fn.substr(0,fn.length-10)+'</a>';
    //...
  }
  };
  
  //onsole.log(document.URL);
  
  if (0)
    Conet.xhr({
      url:'https://api.github.com/repos/samlue15/samlue15.github.io/contents/sound/mid',
  f:function(v) {
    //---
    let a0=JSON.parse(v),a1=[];
    for (let h of a0) if (h.name.endsWith('.midi.json')) a1.push({fn:h.name});
    //onsole.log(a0);
    //onsole.log(a1);
    ps.files=a1;
    Conet.grid(ps);
    //...
  }
    });
  else {
    ps.dir=dir;
  ps.skipFile=function(fn) {
    //---
    return !fn.endsWith('.midi.json');
    //...
  }
    ps.noFolders=1;
    Conet.grid(ps);
  }
  //---
}
)();
</script>


</body>
